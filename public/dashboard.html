<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank Payroll System — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/dashboard.css?v=1779103924">
</head>
<body>
<div class="app-shell" id="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">⬡</div>
      <div>
        <div class="brand-name">Bank Payroll</div>
        <div class="brand-sub">Payroll Advance System</div>
      </div>
    </div>

    <div class="user-card" id="user-card">
      <div class="user-avatar" id="user-avatar">--</div>
      <div class="user-info">
        <div class="user-name" id="user-name">Loading…</div>
        <div class="user-role" id="user-role">--</div>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav"></nav>

    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()">↩ Sign Out</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-area">
    <header class="topbar">
      <div>
        <h1 class="page-title" id="page-title">Dashboard</h1>
        <div class="page-crumb" id="page-crumb"></div>
      </div>
      <div class="topbar-right">
        <button class="notif-btn" id="notif-btn" onclick="toggleNotifications()">
          <span class="notif-icon">🔔</span>
          <span class="notif-badge" id="notif-badge" style="display:none"></span>
        </button>
        <div class="portal-badge" id="portal-badge">--</div>
      </div>
    </header>

    <main class="content-area" id="content-area">
      <div class="loading-state">Loading…</div>
    </main>
  </div>

  <!-- NOTIFICATION DRAWER -->
  <div class="notif-drawer" id="notif-drawer" style="display:none">
    <div class="notif-header">Notifications <button onclick="toggleNotifications()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px">×</button></div>
    <div id="notif-list"></div>
  </div>

  <!-- MODAL OVERLAY -->
  <div class="modal-overlay" id="modal-overlay" style="display:none" onclick="closeModal(event)">
    <div class="modal-box" id="modal-box"></div>
  </div>
</div>

<script src="/js/app.js?v=1779104340"></script>
</body>
</html>
